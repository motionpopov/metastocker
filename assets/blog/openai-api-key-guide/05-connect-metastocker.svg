<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Paste the OpenAI API key into MetaStocker</title>
  <desc id="desc">Illustrated MetaStocker Connect OpenAI card highlighting the OpenAI API key field and a one-file test workflow.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#f5efff"/><stop offset="1" stop-color="#eaf9ff"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#20223a" flood-opacity=".15"/></filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10z" fill="#6547f5"/></marker>
    <style>.ui{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#11121a}.muted{fill:#676b7a}.small{font-size:17px}.body{font-size:21px}.label{font-size:16px;font-weight:750;letter-spacing:.07em}.title{font-size:32px;font-weight:780}.button{font-size:19px;font-weight:750}.step{font-size:22px;font-weight:800;fill:#fff}.key{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:20px}.note{font-size:19px;font-weight:750;fill:#5137cc}</style>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <g class="ui">
    <rect x="62" y="44" width="333" height="48" rx="24" fill="#6547f5"/><text x="88" y="76" class="step">STEP 5 · CONNECT METASTOCKER</text>
    <g filter="url(#shadow)">
      <rect x="78" y="118" width="1044" height="490" rx="24" fill="#fff" stroke="#dfe2ea" stroke-width="2"/>
      <rect x="78" y="118" width="1044" height="72" rx="24" fill="#fafafd"/>
      <circle cx="122" cy="154" r="22" fill="#6547f5"/><text x="114" y="162" class="button" fill="#fff">M</text>
      <text x="158" y="162" class="title">MetaStocker</text>
      <rect x="142" y="230" width="610" height="310" rx="20" fill="#fff" stroke="#dfe2ea" stroke-width="2"/>
      <circle cx="184" cy="275" r="21" fill="#6547f5"/><text x="178" y="283" class="button" fill="#fff">1</text>
      <text x="219" y="285" class="title">Connect OpenAI</text>
      <text x="178" y="335" class="label">OPENAI API KEY</text>
      <circle cx="373" cy="329" r="13" fill="#fff" stroke="#6547f5" stroke-width="2"/><text x="369" y="335" class="small" fill="#5137cc">?</text>
      <rect x="178" y="352" width="538" height="62" rx="12" fill="#fafafd" stroke="#6547f5" stroke-width="3"/>
      <text x="203" y="391" class="key muted">sk-proj-••••••••••••••••••••</text>
      <text x="178" y="449" class="small muted">Kept only in this browser tab and sent directly to OpenAI.</text>
      <text x="178" y="488" class="label">MODEL</text>
      <rect x="178" y="500" width="250" height="54" rx="11" fill="#fafafd" stroke="#cfd3de"/>
      <text x="201" y="534" class="body">gpt-5.4-nano ▾</text>
      <rect x="802" y="246" width="250" height="92" rx="17" fill="#f2efff" stroke="#c9bfff"/>
      <text x="828" y="282" class="label" fill="#5137cc">FIRST TEST</text>
      <text x="828" y="315" class="body">Use one small file</text>
      <rect x="802" y="372" width="250" height="68" rx="14" fill="#6547f5"/>
      <text x="868" y="414" class="button" fill="#fff">Start test</text>
      <rect x="802" y="464" width="250" height="84" rx="14" fill="#edf9f1" stroke="#9bd6ae"/>
      <text x="828" y="498" class="button" fill="#24713c">Then check Usage</text>
      <text x="828" y="529" class="small muted">before a large batch.</text>
    </g>
    <path d="M958 224C908 176 742 194 704 337" fill="none" stroke="#6547f5" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
    <rect x="880" y="76" width="266" height="54" rx="27" fill="#fff" stroke="#c9bfff" stroke-width="2"/><text x="911" y="110" class="note">Paste — never retype</text>
  </g>
</svg>
