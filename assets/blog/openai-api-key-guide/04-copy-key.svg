<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Copy the OpenAI API key immediately</title>
  <desc id="desc">Illustrated Save your key dialog showing a fake redacted key, Copy button, and a warning that the full key is shown once.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#eef9ff"/><stop offset="1" stop-color="#f6efff"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#20223a" flood-opacity=".17"/></filter>
    <style>.ui{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#11121a}.muted{fill:#676b7a}.small{font-size:18px}.body{font-size:21px}.label{font-size:16px;font-weight:750;letter-spacing:.07em}.title{font-size:34px;font-weight:780}.button{font-size:20px;font-weight:750}.step{font-size:22px;font-weight:800;fill:#fff}.key{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:21px;font-weight:650}.warning{font-size:20px;font-weight:750;fill:#8a5a00}</style>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <g class="ui">
    <rect x="62" y="44" width="254" height="48" rx="24" fill="#6547f5"/><text x="88" y="76" class="step">STEP 4 · COPY IT NOW</text>
    <g filter="url(#shadow)">
      <rect x="206" y="124" width="788" height="472" rx="24" fill="#fff" stroke="#dfe2ea" stroke-width="2"/>
      <circle cx="600" cy="191" r="38" fill="#f2efff"/>
      <rect x="582" y="185" width="36" height="30" rx="7" fill="none" stroke="#6547f5" stroke-width="5"/>
      <path d="M590 184v-8c0-15 20-15 20 0v8" fill="none" stroke="#6547f5" stroke-width="5" stroke-linecap="round"/>
      <text x="463" y="263" class="title">Save your API key</text>
      <text x="323" y="305" class="body muted">You will not be able to view the full secret again after closing this dialog.</text>
      <rect x="286" y="343" width="628" height="70" rx="14" fill="#fafafd" stroke="#cfd3de" stroke-width="2"/>
      <text x="317" y="386" class="key">sk-proj-••••••••••••••••EXAMPLE</text>
      <rect x="770" y="351" width="132" height="54" rx="11" fill="#6547f5"/>
      <text x="811" y="385" class="button" fill="#fff">Copy</text>
      <rect x="286" y="445" width="628" height="84" rx="14" fill="#fff8e8" stroke="#f1ce78"/>
      <circle cx="326" cy="487" r="22" fill="#ffd166"/><text x="319" y="495" class="button">!</text>
      <text x="365" y="480" class="warning">Never put this key in a screenshot, email, or chat.</text>
      <text x="365" y="511" class="small muted">Lost it? Delete the old key and create a replacement.</text>
    </g>
    <rect x="390" y="80" width="420" height="48" rx="24" fill="#fff" stroke="#c9bfff" stroke-width="2"/>
    <text x="425" y="111" class="label" fill="#5137cc">FAKE EXAMPLE ONLY — NEVER USE A REAL KEY IN IMAGES</text>
  </g>
</svg>
