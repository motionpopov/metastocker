<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Create a new OpenAI secret API key</title>
  <desc id="desc">Illustrated API Keys page with Create new secret key highlighted and a dialog named MetaStocker.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#f4efff"/><stop offset="1" stop-color="#edfaff"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#20223a" flood-opacity=".15"/></filter>
    <style>.ui{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#11121a}.muted{fill:#676b7a}.small{font-size:17px}.body{font-size:21px}.label{font-size:16px;font-weight:750;letter-spacing:.07em}.title{font-size:31px;font-weight:780}.button{font-size:18px;font-weight:750}.step{font-size:22px;font-weight:800;fill:#fff}.note{font-size:18px;font-weight:700;fill:#5137cc}</style>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <g class="ui">
    <rect x="62" y="44" width="280" height="48" rx="24" fill="#6547f5"/><text x="88" y="76" class="step">STEP 3 · CREATE THE KEY</text>
    <g filter="url(#shadow)">
      <rect x="78" y="118" width="1044" height="490" rx="24" fill="#fff" stroke="#dfe2ea" stroke-width="2"/>
      <text x="122" y="179" class="title">API keys</text>
      <text x="122" y="215" class="body muted">Project: Default project</text>
      <rect x="826" y="150" width="250" height="62" rx="13" fill="#6547f5"/>
      <text x="853" y="188" class="button" fill="#fff">+ Create new secret key</text>
      <rect x="122" y="254" width="954" height="76" rx="14" fill="#fafafd" stroke="#dfe2ea"/>
      <text x="150" y="286" class="label muted">NAME</text><text x="150" y="314" class="body">No keys yet</text>
      <rect x="122" y="355" width="954" height="202" rx="18" fill="#f7f5ff" stroke="#c9bfff" stroke-width="2"/>
      <text x="157" y="400" class="label" fill="#5137cc">CREATE NEW SECRET KEY</text>
      <text x="157" y="441" class="small muted">Name</text>
      <rect x="157" y="454" width="330" height="58" rx="11" fill="#fff" stroke="#cfd3de"/>
      <text x="181" y="490" class="body">MetaStocker</text>
      <text x="528" y="441" class="small muted">Project</text>
      <rect x="528" y="454" width="250" height="58" rx="11" fill="#fff" stroke="#cfd3de"/>
      <text x="552" y="490" class="body">Default project ▾</text>
      <text x="819" y="441" class="small muted">Permissions</text>
      <rect x="819" y="454" width="218" height="58" rx="11" fill="#fff" stroke="#cfd3de"/>
      <text x="843" y="490" class="body">All ▾</text>
      <text x="157" y="542" class="small muted">For a first test, a dedicated project-scoped key is easiest to monitor and revoke.</text>
    </g>
    <rect x="735" y="83" width="411" height="52" rx="26" fill="#fff" stroke="#c9bfff" stroke-width="2"/>
    <text x="765" y="116" class="note">Choose Restricted only if you know the needed scopes</text>
  </g>
</svg>
